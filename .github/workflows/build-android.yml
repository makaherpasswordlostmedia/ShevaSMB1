name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r25c
        run: |
          echo "y" | sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Download SDL2 sources
        run: |
          mkdir -p android/app/jni
          # SDL2
          curl -L https://github.com/libsdl-org/SDL/releases/download/release-2.28.5/SDL2-2.28.5.tar.gz | tar xz -C android/app/jni
          mv android/app/jni/SDL2-2.28.5 android/app/jni/SDL
          # SDL2_image
          curl -L https://github.com/libsdl-org/SDL_image/releases/download/release-2.8.2/SDL2_image-2.8.2.tar.gz | tar xz -C android/app/jni
          mv android/app/jni/SDL2_image-2.8.2 android/app/jni/SDL_image
          # SDL2_mixer
          curl -L https://github.com/libsdl-org/SDL_mixer/releases/download/release-2.8.0/SDL2_mixer-2.8.0.tar.gz | tar xz -C android/app/jni
          mv android/app/jni/SDL2_mixer-2.8.0 android/app/jni/SDL_mixer
          # SDL2_ttf
          curl -L https://github.com/libsdl-org/SDL_ttf/releases/download/release-2.22.0/SDL2_ttf-2.22.0.tar.gz | tar xz -C android/app/jni
          mv android/app/jni/SDL2_ttf-2.22.0 android/app/jni/SDL_ttf

      - name: Copy game source into JNI
        run: |
          cp -r src android/app/jni/src
          cp -r include android/app/jni/include
          # Override with Android-patched versions (touch support)
          cp android/app/jni/src_android/Input.cpp      android/app/jni/src/Input.cpp
          cp android/app/jni/src_android/AndroidJNI.cpp android/app/jni/src/AndroidJNI.cpp
          cp android/app/jni/include_android/Input.h    android/app/jni/include/Input.h

      - name: Copy assets
        run: |
          mkdir -p android/app/src/main/assets
          cp -r bin/res android/app/src/main/assets/res

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperMarioBros-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

