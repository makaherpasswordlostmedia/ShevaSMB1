name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r25c
        run: |
          echo "y" | sdkmanager "ndk;25.2.9519653"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Clone SDL2 libraries (with external/ subfolders)
        run: |
          mkdir -p android/app/jni

          git clone --depth=1 --branch release-2.28.5 \
            https://github.com/libsdl-org/SDL.git \
            android/app/jni/SDL

          git clone --depth=1 --branch release-2.6.3 \
            --recurse-submodules --shallow-submodules \
            https://github.com/libsdl-org/SDL_image.git \
            android/app/jni/SDL_image

          git clone --depth=1 --branch release-2.6.3 \
            --recurse-submodules --shallow-submodules \
            https://github.com/libsdl-org/SDL_mixer.git \
            android/app/jni/SDL_mixer

          git clone --depth=1 --branch release-2.20.2 \
            --recurse-submodules --shallow-submodules \
            https://github.com/libsdl-org/SDL_ttf.git \
            android/app/jni/SDL_ttf

          mkdir -p android/app/jni/SDL2
          cp android/app/jni/SDL/include/*.h              android/app/jni/SDL2/
          cp android/app/jni/SDL_image/SDL_image.h        android/app/jni/SDL2/SDL_image.h
          cp android/app/jni/SDL_mixer/include/SDL_mixer.h android/app/jni/SDL2/SDL_mixer.h
          cp android/app/jni/SDL_ttf/SDL_ttf.h            android/app/jni/SDL2/SDL_ttf.h

      - name: Copy game source into JNI
        run: |
          cp -r src android/app/jni/src
          cp -r include android/app/jni/include
          cp android/app/jni/src_android/Input.cpp         android/app/jni/src/Input.cpp
          cp android/app/jni/src_android/AndroidJNI.cpp    android/app/jni/src/AndroidJNI.cpp
          cp android/app/jni/src_android/SoundManager.cpp  android/app/jni/src/SoundManager.cpp
          cp android/app/jni/src_android/TextureManager.cpp android/app/jni/src/TextureManager.cpp
          cp android/app/jni/src_android/main.cpp           android/app/jni/src/main.cpp
          cp android/app/jni/include_android/Input.h       android/app/jni/include/Input.h

      - name: Copy assets
        run: |
          mkdir -p android/app/src/main/assets
          cp -r bin/res android/app/src/main/assets/res

      - name: Generate Gradle wrapper
        working-directory: android
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar \
            -o gradle/wrapper/gradle-wrapper.jar
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew -o gradlew
          chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperMarioBros-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
