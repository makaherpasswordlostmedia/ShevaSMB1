name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r25c
        run: |
          echo "y" | sdkmanager "ndk;25.2.9519653"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Clone SDL2 libraries (with external/ subfolders)
        run: |
          mkdir -p android/app/jni

          git clone --depth=1 --branch release-2.28.5 \
            https://github.com/libsdl-org/SDL.git \
            android/app/jni/SDL

          git clone --depth=1 --branch release-2.6.3 \
            --recurse-submodules --shallow-submodules \
            https://github.com/libsdl-org/SDL_image.git \
            android/app/jni/SDL_image

          git clone --depth=1 --branch release-2.6.3 \
            https://github.com/libsdl-org/SDL_mixer.git \
            android/app/jni/SDL_mixer

          git clone --depth=1 --branch release-2.20.2 \
            --recurse-submodules --shallow-submodules \
            https://github.com/libsdl-org/SDL_ttf.git \
            android/app/jni/SDL_ttf

          # Game uses #include <SDL2/SDL.h>, <SDL2/SDL_mixer.h>, etc.
          # Each SDL lib puts its headers in a different location:
          #   SDL/include/SDL.h, SDL/include/SDL_*.h
          #   SDL_image/SDL_image.h
          #   SDL_mixer/SDL_mixer.h
          #   SDL_ttf/SDL_ttf.h
          # Fix: create a real jni/SDL2/ folder and symlink all headers into it.
          mkdir -p android/app/jni/SDL2
          ln -s ../SDL/include/*.h      android/app/jni/SDL2/
          ln -s ../SDL_image/SDL_image.h android/app/jni/SDL2/SDL_image.h
          ln -s ../SDL_mixer/SDL_mixer.h android/app/jni/SDL2/SDL_mixer.h
          ln -s ../SDL_ttf/SDL_ttf.h     android/app/jni/SDL2/SDL_ttf.h

      - name: Copy game source into JNI
        run: |
          cp -r src android/app/jni/src
          cp -r include android/app/jni/include
          cp android/app/jni/src_android/Input.cpp       android/app/jni/src/Input.cpp
          cp android/app/jni/src_android/AndroidJNI.cpp  android/app/jni/src/AndroidJNI.cpp
          cp android/app/jni/include_android/Input.h     android/app/jni/include/Input.h

      - name: Copy assets
        run: |
          mkdir -p android/app/src/main/assets
          cp -r bin/res android/app/src/main/assets/res

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperMarioBros-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
